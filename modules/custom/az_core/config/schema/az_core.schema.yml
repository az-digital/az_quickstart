az_core.settings:
  type: config_object
  label: 'Quickstart Core settings'
  mapping:
    monitoring_page:
      type: mapping
      label: 'Monitoring page'
      mapping:
        enabled:
          type: boolean
          label: 'Monitoring page enabled'
        path:
          type: string
          label: 'Monitoring page path'
    enterprise_attributes:
      type: mapping
      label: 'Enterprise attributes'
      mapping:
        locked:
          type: boolean
          label: 'Enterprise attribute edits prohibited'

block.settings.az_navbar_fullscreen_menu_block:*:
  type: block_settings
  label: 'AZ Navbar Fullscreen Menu block'
  mapping:
    primary_menu:
      type: string
      label: 'Primary menu'
    cta_menu:
      type: string
      label: 'Call to Action menu'
    footer_top_menu:
      type: string
      label: 'Footer Top menu'
    footer_top_desktop_heading:
      type: string
      label: 'Footer Top Desktop Heading'
    footer_top_mobile_heading:
      type: string
      label: 'Footer Top Mobile Heading'
    footer_bottom_menu:
      type: string
      label: 'Footer Bottom menu'
    footer_bottom_desktop_heading:
      type: string
      label: 'Footer Bottom Desktop Heading'
    footer_bottom_mobile_heading:
      type: string
      label: 'Footer Bottom Mobile Heading'
    search_form_block_desktop_navbar:
      type: string
      label: 'Search form block - Desktop navbar'
    search_form_block_offcanvas:
      type: string
      label: 'Search form block - Offcanvas'
