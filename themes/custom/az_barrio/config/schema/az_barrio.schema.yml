# Schema for the configuration files of the Bootstrap Barrio Subtheme.

az_barrio.settings:
  type: theme_settings
  label: 'Arizona Barrio Subtheme settings'
  mapping:

    # Library.
    # ----------------------------
    bootstrap_barrio_library:
      type: string
      label: 'Load library'
    bootstrap_barrio_source:
      type: string
      label: 'Load library'

    # Container.
    # ----------------------------
    bootstrap_barrio_fluid_container:
      type: integer
      label: 'Fluid container'
    bootstrap_barrio_container:
      type: string
      label: 'Container'

    # Region.
    # ----------------------------
    bootstrap_barrio_region_clean_alert:
      type: boolean
      label: 'Clean wrapper for alert region'
    bootstrap_barrio_region_class_alert:
      type: string
      label: 'Classes for alert region'
    bootstrap_barrio_region_clean_header_ua_utilities:
      type: boolean
      label: 'Clean wrapper for arizona utilities region'
    bootstrap_barrio_region_class_header_ua_utilities:
      type: string
      label: 'Classes for arizona utilities region'
    bootstrap_barrio_region_clean_header_2:
      type: boolean
      label: 'Clean wrapper for header 2 region'
    bootstrap_barrio_region_class_navigation:
      type: string
      label: 'Classes for arizona navigation region'
    bootstrap_barrio_region_clean_navigation:
      type: boolean
      label: 'Clean wrapper for navigation region'
    bootstrap_barrio_region_class_navigation_offcanvas:
      type: string
      label: 'Classes for arizona navigation off-canvas region'
    bootstrap_barrio_region_clean_navigation_offcanvas:
      type: boolean
      label: 'Clean wrapper for navigation off-canvas region'
    bootstrap_barrio_region_clean_content_featured:
      type: boolean
      label: 'Clean wrapper for content featured region'
    bootstrap_barrio_region_class_content_featured:
      type: string
      label: 'Classes for content featured region'
    bootstrap_barrio_region_clean_content_top:
      type: boolean
      label: 'Clean wrapper for content top region'
    bootstrap_barrio_region_class_content_top:
      type: string
      label: 'Classes for content top region'
    bootstrap_barrio_region_clean_content_2_col_1:
      type: boolean
      label: 'Clean wrapper for content 2 column 1 region'
    bootstrap_barrio_region_class_content_2_col_1:
      type: string
      label: 'Classes for content 2 column 1 region'
    bootstrap_barrio_region_clean_content_2_col_2:
      type: boolean
      label: 'Clean wrapper for content 2 column 2 region'
    bootstrap_barrio_region_class_content_2_col_2:
      type: string
      label: 'Classes for content 2 column 2 region'
    bootstrap_barrio_region_clean_content_3_col_1:
      type: boolean
      label: 'Clean wrapper for content 3 column 1 region'
    bootstrap_barrio_region_class_content_3_col_1:
      type: string
      label: 'Classes for content 3 column 1 region'
    bootstrap_barrio_region_clean_content_3_col_2:
      type: boolean
      label: 'Clean wrapper for content 3 column 2 region'
    bootstrap_barrio_region_class_content_3_col_2:
      type: string
      label: 'Classes for content 3 column 2 region'
    bootstrap_barrio_region_clean_content_3_col_3:
      type: boolean
      label: 'Clean wrapper for content 3 column 3 region'
    bootstrap_barrio_region_class_content_3_col_3:
      type: string
      label: 'Classes for content 3 column 3 region'
    bootstrap_barrio_region_clean_full_width_content_bottom:
      type: boolean
      label: 'Clean wrapper for full-width content bottom region'
    bootstrap_barrio_region_class_full_width_content_bottom:
      type: string
      label: 'Classes for full-width content bottom region'
    bootstrap_barrio_region_clean_content_4_col_1:
      type: boolean
      label: 'Clean wrapper for content 4 column 1 region'
    bootstrap_barrio_region_class_content_4_col_1:
      type: string
      label: 'Classes for content 4 column 1 region'
    bootstrap_barrio_region_clean_content_4_col_2:
      type: boolean
      label: 'Clean wrapper for content 4 column 2 region'
    bootstrap_barrio_region_class_content_4_col_2:
      type: string
      label: 'Classes for content 4 column 2 region'
    bootstrap_barrio_region_clean_content_4_col_3:
      type: boolean
      label: 'Clean wrapper for content 4 column 3 region'
    bootstrap_barrio_region_class_content_4_col_3:
      type: string
      label: 'Classes for content 4 column 3 region'
    bootstrap_barrio_region_clean_content_4_col_4:
      type: boolean
      label: 'Clean wrapper for content 4 column 4 region'
    bootstrap_barrio_region_class_content_4_col_4:
      type: string
      label: 'Classes for content 4 column 4 region'
    bootstrap_barrio_region_clean_content_bottom:
      type: boolean
      label: 'Clean wrapper for content bottom region'
    bootstrap_barrio_region_class_content_bottom:
      type: string
      label: 'Classes for content bottom region'
    bootstrap_barrio_region_clean_footer:
      type: boolean
      label: 'Clean wrapper for footer region'
    bootstrap_barrio_region_class_footer:
      type: string
      label: 'Classes for footer region'
    bootstrap_barrio_region_clean_footer_sub:
      type: boolean
      label: 'Clean wrapper for footer sub region'
    bootstrap_barrio_region_class_footer_sub:
      type: string
      label: 'Classes for footer sub region'
    bootstrap_barrio_region_clean_footer_sub_menus:
      type: boolean
      label: 'Clean wrapper for footer sub menus region'
    bootstrap_barrio_region_class_footer_sub_menus:
      type: string
      label: 'Classes for footer sub menus region'
    bootstrap_barrio_region_clean_az_page_bottom:
      type: boolean
      label: 'Clean wrapper for page bottom region'
    bootstrap_barrio_region_class_az_page_bottom:
      type: string
      label: 'Classes for page bottom region'
    bootstrap_barrio_region_clean_header:
      type: integer
      label: 'Clean wrapper for Header region'
    bootstrap_barrio_region_class_header:
      type: string
      label: 'Classes for Header region'
    bootstrap_barrio_region_clean_help:
      type: integer
      label: 'Clean wrapper for Help region'
    bootstrap_barrio_region_class_help:
      type: string
      label: 'Classes for Help region'
    bootstrap_barrio_region_clean_sidebar_first:
      type: integer
      label: 'Clean wrapper for Sidebar first region'
    bootstrap_barrio_region_class_sidebar_first:
      type: string
      label: 'Classes for Sidebar first region'
    bootstrap_barrio_region_clean_sidebar_second:
      type: integer
      label: 'Clean wrapper for Sidebar second region'
    bootstrap_barrio_region_class_sidebar_second:
      type: string
      label: 'Classes for Sidebar second region'
    bootstrap_barrio_region_clean_highlighted:
      type: integer
      label: 'Clean wrapper for Highlighted region'
    bootstrap_barrio_region_class_highlighted:
      type: string
      label: 'Classes for Highlighted region'
    bootstrap_barrio_region_clean_breadcrumb:
      type: integer
      label: 'Clean wrapper for Breadcrumb region'
    bootstrap_barrio_region_class_breadcrumb:
      type: string
      label: 'Classes for Breadcrumb region'
    bootstrap_barrio_region_clean_content:
      type: integer
      label: 'Clean wrapper for Content region'
    bootstrap_barrio_region_class_content:
      type: string
      label: 'Classes for Content region'
    bootstrap_barrio_region_clean_branding:
      type: integer
      label: 'Clean wrapper for Branding region'
    bootstrap_barrio_region_class_branding:
      type: string
      label: 'Classes for Branding region'

    # Sidebar position.
    # ----------------------------
    bootstrap_barrio_sidebar_position:
      type: string
      label: 'Sidebar position'
    bootstrap_barrio_content_offset:
      type: integer
      label: 'Content offset'

    # Sidebar first layout.
    # ----------------------------
    bootstrap_barrio_sidebar_collapse:
      type: integer
      label: 'Sidebar collapse'
    bootstrap_barrio_sidebar_first_width:
      type: integer
      label: 'Sidebar first width'
    bootstrap_barrio_sidebar_first_offset:
      type: integer
      label: 'Sidebar first offset'

    # Sidebar second layout.
    # ----------------------------
    bootstrap_barrio_sidebar_second_width:
      type: integer
      label: 'Sidebar second width'
    bootstrap_barrio_sidebar_second_offset:
      type: integer
      label: 'Sidebar second layout'

    # Node.
    # ----------------------------
    bootstrap_barrio_hide_node_label:
      type: integer
      label: 'Hide node label'

    # Breadcrumb
    # ----------------------------
    bootstrap_barrio_breadcrumb_divider:
      type: string
      label: 'Breadcrumb Divider'

    # Buttons.
    # ----------------------------
    bootstrap_barrio_button:
      type: integer
      label: 'Convert input submit to button element'
    bootstrap_barrio_button_size:
      type: string
      label: 'Default button size'
    bootstrap_barrio_button_type:
      type: string
      label: 'Default button type'
    bootstrap_barrio_button_outline:
      type: integer
      label: 'Button with outline format'

    # Navbar.
    # ----------------------------
    bootstrap_barrio_navbar_container:
      type: string
      label: 'Navbar width container'
    bootstrap_barrio_navbar_toggle:
      type: string
      label: 'Navbar toggle size'
    bootstrap_barrio_navbar_flyout:
      type: boolean
      label: 'Flyout style main menu'
    bootstrap_barrio_navbar_slide:
      type: boolean
      label: 'Sliding navbar'
    bootstrap_barrio_navbar_offcanvas:
      type: string
      label: 'Navbar offcanvas'

    # Messages.
    # ----------------------------
    bootstrap_barrio_messages_widget:
      type: string
      label: 'Messages widget'
    bootstrap_barrio_messages_widget_toast_delay:
      type: integer
      label: 'Toast delay'

    # Form.
    # ----------------------------
    bootstrap_barrio_float_label:
      type: string
      label: 'Float Labels'
    bootstrap_barrio_checkbox:
      type: string
      label: 'Checkbox & Radio Style'

    # Affix.
    # ----------------------------
    bootstrap_barrio_sidebar_first_affix:
      type: integer
      label: 'Affix sidebar first'
    bootstrap_barrio_sidebar_second_affix:
      type: integer
      label: 'Affix sidebar second'

    # Scrollspy.
    # ----------------------------
    bootstrap_barrio_scroll_spy:
      type: string
      label: 'Scrollspy element ID'

    # System messages.
    # ----------------------------
    bootstrap_barrio_system_messages:
      type: string
      label: 'System messages color scheme'

    # Tables.
    # ----------------------------
    bootstrap_barrio_table_style:
      type: string
      label: 'Table cell style'
    bootstrap_barrio_table_hover:
      type: integer
      label: 'Hover effect over table cells'
    bootstrap_barrio_table_head:
      type: string
      label: 'Table header color scheme'

    # Image fluid.
    # ----------------------------
    bootstrap_barrio_image_fluid:
      type: boolean
      label: 'Apply img-fluid style to all content images'

    # Tabs.
    # ----------------------------
    bootstrap_barrio_tabs_style:
      type: string
      label: 'Tabs style'

    # Colors.
    # ----------------------------
    bootstrap_barrio_enable_color:
      type: boolean
      label: 'Enable color scheme'

    # AZ Barrio specific settings
    # ----------------------------
    wordmark:
      type: boolean
      label: 'Enable wordmark logo'
    az_main_menu_style:
      type: string
      label: 'Main menu style'
    az_bs_overlay_menu_scroll:
      type: boolean
      label: 'Enable overlay menu scroll'
    land_acknowledgment:
      type: boolean
      label: 'Enable land acknowledgment'
    info_security_privacy:
      type: boolean
      label: 'Enable privacy link'
    copyright_notice:
      type: string
      label: 'Copyright notice'
    az_hide_front_title:
      type: boolean
      label: 'Enable hide front page title'
    az_back_to_top:
      type: boolean
      label: 'Enable ''Back to Top'' button'
    az_bootstrap_source:
      type: string
      label: 'AZ Bootstrap source'
    az_bootstrap_cdn_version:
      type: string
      label: 'AZ Bootstrap CDN version'
    az_bootstrap_cdn_version_css:
      type: string
      label: 'AZ Bootstrap CDN version CSS'
    az_bootstrap_cdn_version_js:
      type: string
      label: 'AZ Bootstrap CDN version JS'
    az_bootstrap_minified:
      type: boolean
      label: 'Enable AZ Bootstrap minification'
    az_barrio_font:
      type: boolean
      label: 'Use the centrally-managed Typekit webfont, Proxima Nova'
    az_barrio_material_symbols_rounded:
      type: boolean
      label: 'Use Material Symbols Rounded Icons'
    az_barrio_material_design_sharp_icons:
      type: boolean
      label: '(Deprecated) Use Material Design Sharp Icons'
    az_barrio_az_icons:
      type: boolean
      label: 'Use Arizona Icons'
    az_barrio_az_icons_source:
      type: string
      label: 'Arizona Icons source'
    az_icons_minified:
      type: boolean
      label: 'Use minified version of Arizona Icons'
    az_icons_cdn_version:
      type: string
      label: 'Arizona Icons CDN version'
    sticky_footer:
      type: boolean
      label: 'Enable AZ Bootstrap sticky footer template'
    az_barrio_logo_svg_inline:
      type: boolean
      label: 'Inline logo SVG (Experimental)'
    az_barrio_footer_logo_svg_inline:
      type: boolean
      label: 'Inline footer logo SVG (Experimental)'
    primary_logo_alt_text:
      type: string
      label: 'Primary logo alt text'
    primary_logo_title_text:
      type: string
      label: 'Primary logo title text'
    footer_logo_link_destination:
      type: string
      label: 'Footer logo link destination'
    footer_logo_alt_text:
      type: string
      label: 'Footer logo alt text'
    footer_logo_title_text:
      type: string
      label: 'Footer logo title text'
    footer_logo_path:
      type: string
      label: 'Footer logo path'
    header_one_col_classes:
      type: string
      label: 'Header column one classes'
    header_two_col_classes:
      type: string
      label: 'Header column two classes'
    az_barrio_navbar_offcanvas:
      type: boolean
      label: 'Enable navbar offcanvas'
    external_links:
      type: boolean
      label: 'Enable external links'
    footer_default_logo:
      type: integer
      label: 'Use default footer logo'
