    # AZ Barrio specific settings
    # ----------------------------
    wordmark:
      type: boolean
      label: 'Enable wordmark logo'
    az_main_menu_style:
      type: string
      label: 'Main menu style'
    az_bs_overlay_menu_scroll:
      type: boolean
      label: 'Enable overlay menu scroll'
    land_acknowledgment:
      type: boolean
      label: 'Enable land acknowledgment'
    info_security_privacy:
      type: boolean
      label: 'Enable privacy link'
    copyright_notice:
      type: text
      label: 'Copyright notice'
    az_hide_front_title:
      type: boolean
      label: 'Enable hide front page title'
    az_back_to_top:
      type: boolean
      label: 'Enable ''Back to Top'' button'
    az_bootstrap_source:
      type: string
      label: 'AZ Bootstrap source'
    az_bootstrap_cdn_version:
      type: string
      label: 'AZ Bootstrap CDN version'
    az_bootstrap_cdn_version_css:
      type: string
      label: 'AZ Bootstrap CDN version CSS'
    az_bootstrap_cdn_version_js:
      type: string
      label: 'AZ Bootstrap CDN version JS'
    az_bootstrap_minified:
      type: boolean
      label: 'Enable AZ Bootstrap minification'
    az_barrio_font:
      type: boolean
      label: 'Use the centrally-managed Typekit webfont, Proxima Nova'
    az_barrio_material_symbols_rounded:
      type: boolean
      label: 'Use Material Symbols Rounded Icons'
    az_barrio_material_design_sharp_icons:
      type: boolean
      label: '(Deprecated) Use Material Design Sharp Icons'
    az_barrio_az_icons:
      type: boolean
      label: 'Use Arizona Icons'
    az_barrio_az_icons_source:
      type: string
      label: 'Arizona Icons source'
    az_icons_minified:
      type: boolean
      label: 'Use minified version of Arizona Icons'
    az_icons_cdn_version:
      type: string
      label: 'Arizona Icons CDN version'
    sticky_footer:
      type: boolean
      label: 'Enable AZ Bootstrap sticky footer template'
    az_barrio_logo_svg_inline:
      type: boolean
      label: 'Inline logo SVG (Experimental)'
    az_barrio_footer_logo_svg_inline:
      type: boolean
      label: 'Inline footer logo SVG (Experimental)'
    primary_logo_alt_text:
      type: label
      label: 'Primary logo alt text'
    primary_logo_title_text:
      type: label
      label: 'Primary logo title text'
    footer_default_logo:
      type: boolean
      label: 'Use default footer logo'
    footer_logo_link_destination:
      type: string
      label: 'Footer logo link destination'
    footer_logo_alt_text:
      type: label
      label: 'Footer logo alt text'
    footer_logo_title_text:
      type: label
      label: 'Footer logo title text'
    footer_logo_path:
      type: path
      label: 'Footer logo path'
    header_one_col_classes:
      type: string
      label: 'Header column one classes'
    header_two_col_classes:
      type: string
      label: 'Header column two classes'
    az_barrio_navbar_offcanvas:
      type: boolean
      label: 'Enable navbar offcanvas'
    external_links:
      type: boolean
      label: 'Enable external links'
