# Schema for the configuration files of the Bootstrap Barrio Subtheme.

az_barrio.settings:
  type: bootstrap_barrio.settings
  label: 'Arizona Barrio Subtheme settings'
  mapping:
    langcode:
      type: langcode
      label: 'Language code'
    # Missing bootstrap_barrio region width settings - extending parent theme schema
    # These are generated by bootstrap_barrio but missing from their schema
    # ----------------------------
    bootstrap_barrio_region_width_alert:
      type: boolean
      label: 'Full width wrapper for alert region'
    bootstrap_barrio_region_width_header_ua_utilities:
      type: boolean
      label: 'Full width wrapper for arizona utilities region'
    bootstrap_barrio_region_width_branding:
      type: boolean
      label: 'Full width wrapper for branding region'
    bootstrap_barrio_region_width_header:
      type: boolean
      label: 'Full width wrapper for header region'
    bootstrap_barrio_region_width_header_2:
      type: boolean
      label: 'Full width wrapper for header 2 region'
    bootstrap_barrio_region_width_navigation:
      type: boolean
      label: 'Full width wrapper for navigation region'
    bootstrap_barrio_region_width_navigation_offcanvas:
      type: boolean
      label: 'Full width wrapper for navigation off-canvas region'
    bootstrap_barrio_region_width_help:
      type: boolean
      label: 'Full width wrapper for help region'
    bootstrap_barrio_region_width_content_featured:
      type: boolean
      label: 'Full width wrapper for content featured region'
    bootstrap_barrio_region_width_highlighted:
      type: boolean
      label: 'Full width wrapper for highlighted region'
    bootstrap_barrio_region_width_breadcrumb:
      type: boolean
      label: 'Full width wrapper for breadcrumb region'
    bootstrap_barrio_region_width_content_top:
      type: boolean
      label: 'Full width wrapper for content top region'
    bootstrap_barrio_region_width_sidebar_first:
      type: boolean
      label: 'Full width wrapper for sidebar first region'
    bootstrap_barrio_region_width_sidebar_second:
      type: boolean
      label: 'Full width wrapper for sidebar second region'
    bootstrap_barrio_region_width_content:
      type: boolean
      label: 'Full width wrapper for content region'
    bootstrap_barrio_region_width_full_width_content_bottom:
      type: boolean
      label: 'Full width wrapper for full-width content bottom region'
    bootstrap_barrio_region_width_content_2_col_1:
      type: boolean
      label: 'Full width wrapper for content 2 column 1 region'
    bootstrap_barrio_region_width_content_2_col_2:
      type: boolean
      label: 'Full width wrapper for content 2 column 2 region'
    bootstrap_barrio_region_width_content_3_col_1:
      type: boolean
      label: 'Full width wrapper for content 3 column 1 region'
    bootstrap_barrio_region_width_content_3_col_2:
      type: boolean
      label: 'Full width wrapper for content 3 column 2 region'
    bootstrap_barrio_region_width_content_3_col_3:
      type: boolean
      label: 'Full width wrapper for content 3 column 3 region'
    bootstrap_barrio_region_width_content_bottom:
      type: boolean
      label: 'Full width wrapper for content bottom region'
    bootstrap_barrio_region_width_content_4_col_1:
      type: boolean
      label: 'Full width wrapper for content 4 column 1 region'
    bootstrap_barrio_region_width_content_4_col_2:
      type: boolean
      label: 'Full width wrapper for content 4 column 2 region'
    bootstrap_barrio_region_width_content_4_col_3:
      type: boolean
      label: 'Full width wrapper for content 4 column 3 region'
    bootstrap_barrio_region_width_content_4_col_4:
      type: boolean
      label: 'Full width wrapper for content 4 column 4 region'
    bootstrap_barrio_region_width_footer:
      type: boolean
      label: 'Full width wrapper for footer region'
    bootstrap_barrio_region_width_footer_sub:
      type: boolean
      label: 'Full width wrapper for footer sub region'
    bootstrap_barrio_region_width_footer_sub_menus:
      type: boolean
      label: 'Full width wrapper for footer sub menus region'
    bootstrap_barrio_region_width_az_page_bottom:
      type: boolean
      label: 'Full width wrapper for arizona page bottom region'

    # AZ Barrio custom region settings - not in parent theme
    # ----------------------------
    bootstrap_barrio_region_clean_alert:
      type: boolean
      label: 'Clean wrapper for alert region'
    bootstrap_barrio_region_class_alert:
      type: string
      label: 'Classes for alert region'
    bootstrap_barrio_region_clean_header_ua_utilities:
      type: boolean
      label: 'Clean wrapper for arizona utilities region'
    bootstrap_barrio_region_class_header_ua_utilities:
      type: string
      label: 'Classes for arizona utilities region'
    bootstrap_barrio_region_clean_header_2:
