    search_form_block_desktop_navbar:
      type: array
      title: Search Form Block - Desktop Navbar
      description: The search form block content to display in the desktop navbar.
    search_form_block_offcanvas:
      type: array
      title: Search Form Block - Offcanvas
      description: The search form block content to display in the offcanvas modal.
    wordmark:
      type: boolean
      title: Wordmark
      description: Setting to display the university wordmark in the navbar.
    wordmark_url:
      type: string
      title: Wordmark URL
      description: The URL for the wordmark logo.
