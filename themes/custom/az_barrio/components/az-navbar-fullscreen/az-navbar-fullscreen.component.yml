          title:
            type: string
            title: Title
            description: The menu link title.
          url:
            type: object
            title: URL
            description: The menu link url, instance of \Drupal\Core\Url
          is_expanded:
            type: boolean
            title: Is expanded
            description: TRUE if the link has visible children within the current menu tree.
          is_collapsed:
            type: boolean
            title: Is collapsed
            description: TRUE if the link has children within the current menu tree that are not currently visible.
          in_active_trail:
            type: boolean
            title: In active trail
            description: TRUE if the link is in the active trail.
    footer_top_items:
      type: array
      title: Footer Top Menu Items
      description: A nested list of footer top menu items.
      items:
        type: object
        title: Menu Item
        properties:
          attributes:
            type: object
            title: HTML attributes
            description: HTML attributes for the menu item.
          below:
            type: array
            title: Child items
            description: The menu item child items.
            items:
              type: object
          title:
            type: string
            title: Title
            description: The menu link title.
          url:
            type: object
            title: URL
            description: The menu link url, instance of \Drupal\Core\Url
          is_expanded:
            type: boolean
            title: Is expanded
            description: TRUE if the link has visible children within the current menu tree.
          is_collapsed:
            type: boolean
            title: Is collapsed
            description: TRUE if the link has children within the current menu tree that are not currently visible.
          in_active_trail:
            type: boolean
            title: In active trail
            description: TRUE if the link is in the active trail.
    footer_top_desktop_heading:
      type: string
      title: Footer Top Desktop Heading
      description: The heading text for the footer top menu on desktop devices.
    footer_top_mobile_heading:
      type: string
      title: Footer Top Mobile Heading
      description: The heading text for the footer top menu on mobile devices.
    footer_bottom_items:
      type: array
      title: Footer Bottom Menu Items
